name: Fixed UEFI Greeter Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Patch obsolete dependencies
      run: |
        # Исправляем старый манифест Cargo, принудительно заменяя версии ломающихся библиотек
        sed -i 's/uefi = .*/uefi = "0.15.0"/' Cargo.toml || true
        sed -i 's/uefi-services = .*/uefi-services = "0.11.0"/' Cargo.toml || true

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: 1.68.0
        targets: x86_64-unknown-uefi

    - name: Build UEFI Application
      run: cargo build --release --target x86_64-unknown-uefi

    - name: Upload Finished EFI
      uses: actions/upload-artifact@v4
      with:
        name: opal-uefi-greeter-bin
        path: target/x86_64-unknown-uefi/release/opal_uefi_greeter.efi
